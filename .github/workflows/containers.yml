name: Build Docker containers
on:
  push:
    paths:
      - 'build/containers/*.dockerfile'
      - '.github/workflows/containers.yml'
  pull_request_target:
    paths:
      - 'build/containers/*.dockerfile'

defaults:
  run:
    shell: pwsh

jobs:
  build-containers:
    name: Build Containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: "${{ (github.event.pull_request || github.event.push).head.sha }}"
    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push missing Docker images
      run: |
        $files = gci build/containers/*.dockerfile;
        foreach ($f in $files)
        {
          $name = [System.IO.Path]::GetFileNameWithoutExtension($f.Name);
          $hash = (Get-FileHash -Algorithm SHA256 $f).Hash;
          $imgName = "ghcr.io/${{ github.repository_owner }}/monomod-tester:$name-$hash";
          # Only rebuild if the container doesn't exist upstream already
          docker manifest inspect $imgName | out-null;
          if ($?) { continue; }
          # Upstream doesn't exist yet, build
          docker buildx build -t $imgName -f $($f.FullName) $($f.Directory.FullName)
          if (!$?) { exit 1; }
          # and push
          docker push --compress $imgName
          if (!$?) { exit 1; }
        }
